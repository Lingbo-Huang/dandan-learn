---
layout: default
---
<style>
  .post-hero {
    background: linear-gradient(135deg, #1a1a2e, #16213e);
    color: white;
    padding: 48px 32px 40px;
    margin: -32px -24px 40px;
    border-radius: 0 0 20px 20px;
  }
  .post-hero .track-tag {
    display: inline-block;
    background: rgba(255,255,255,0.15);
    padding: 4px 14px;
    border-radius: 20px;
    font-size: 0.8em;
    margin-bottom: 14px;
  }
  .post-hero h1 { font-size: 1.9em; margin-bottom: 10px; line-height: 1.3; }
  .post-hero .meta { opacity: 0.65; font-size: 0.88em; }
  .article-body { max-width: 820px; }
  .article-body h2 { margin-top: 40px; padding-bottom: 8px; border-bottom: 2px solid #e5e7eb; font-size: 1.4em; }
  .article-body h3 { margin-top: 28px; color: #374151; font-size: 1.15em; }
  .article-body p  { margin: 14px 0; }
  .article-body ul, .article-body ol { padding-left: 24px; margin: 12px 0; }
  .article-body li { margin: 6px 0; }
  .article-body code { background: #f1f5f9; padding: 2px 7px; border-radius: 5px; font-size: 0.87em; font-family: 'SF Mono', Consolas, monospace; }
  .article-body pre { background: #1e293b; color: #e2e8f0; padding: 22px; border-radius: 12px; overflow-x: auto; margin: 20px 0; }
  .article-body pre code { background: none; color: inherit; padding: 0; font-size: 0.9em; }
  .article-body table { width: 100%; border-collapse: collapse; margin: 20px 0; font-size: 0.92em; }
  .article-body th { background: #f8fafc; padding: 10px 14px; border: 1px solid #d1d5db; text-align: left; }
  .article-body td { padding: 9px 14px; border: 1px solid #d1d5db; }
  .article-body tr:nth-child(even) td { background: #f9fafb; }
  .article-body blockquote { border-left: 4px solid #3b82f6; padding: 14px 20px; background: #eff6ff; color: #1e40af; border-radius: 0 10px 10px 0; margin: 20px 0; }
  .nav-links { display: flex; justify-content: space-between; margin-top: 60px; padding-top: 24px; border-top: 1px solid #e5e7eb; font-size: 0.9em; }
  .nav-links a { color: #0969da; text-decoration: none; }
  .nav-links a:hover { text-decoration: underline; }
  .back-link { margin-bottom: 20px; }
  .back-link a { color: #0969da; text-decoration: none; font-size: 0.9em; }
</style>

<div class="post-hero">
  {% if page.track %}<span class="track-tag">{{ page.track }}</span>{% endif %}
  <h1>{{ page.title }}</h1>
  {% if page.week %}<div class="meta">{{ page.week }} · {{ page.day }}</div>{% endif %}
</div>

<div class="article-body">
  {{ content }}
</div>
