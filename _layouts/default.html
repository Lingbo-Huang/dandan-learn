<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} · {% endif %}🥚🥚的学习基地</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script>MathJax={tex:{inlineMath:[['$','$'],['\\(','\\)']],displayMath:[['$$','$$'],['\\[','\\]']]}}</script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
  <style>
    :root {
      --bg:      #f7f6f3;
      --surface: #ffffff;
      --border:  #e8e5e0;
      --border2: #f0ede8;
      --text:    #1a1a1a;
      --text2:   #555;
      --text3:   #999;
      --radius:  10px;
      --shadow:  0 2px 16px rgba(0,0,0,0.06);

      /* 每条线专属色 */
      --ai:     #2563eb;
      --llm:    #7c3aed;
      --agent:  #d97706;
      --infra:  #dc2626;
      --quant:  #16a34a;
      --wisdom: #9333ea;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', -apple-system, 'PingFang SC', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      font-size: 15px;
    }

    /* ── 进度条 ── */
    #progress-bar {
      position: fixed; top: 0; left: 0; height: 2px; width: 0%;
      background: linear-gradient(90deg, #2563eb, #7c3aed);
      z-index: 9999; transition: width 0.1s;
      pointer-events: none;
    }

    /* ── 导航 ── */
    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(247,246,243,0.92);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      height: 56px;
      display: flex; align-items: center;
      padding: 0 32px; gap: 4px;
    }
    .nav-brand {
      font-weight: 700; font-size: 0.95em;
      color: var(--text); text-decoration: none;
      margin-right: 28px; white-space: nowrap;
    }
    .nav-brand:hover { color: var(--ai); }
    .nav-links { display: flex; gap: 2px; flex: 1; }
    .nav-links a {
      display: flex; align-items: center; gap: 6px;
      color: var(--text2); text-decoration: none;
      padding: 6px 12px; border-radius: 6px;
      font-size: 0.84em; font-weight: 500;
      transition: all 0.15s;
    }
    .nav-links a:hover { color: var(--text); background: var(--border2); }
    .nav-links a.active { color: var(--text); background: var(--border); }
    .dot {
      width: 7px; height: 7px; border-radius: 50%;
      flex-shrink: 0;
    }

    /* ── 主容器 ── */
    .page-wrap { max-width: 1100px; margin: 0 auto; padding: 40px 32px 80px; }

    /* ── 首页 Hero ── */
    .home-hero {
      text-align: center;
      padding: 72px 24px 64px;
    }
    .hero-eyebrow {
      display: inline-block;
      background: #eef2ff; color: #4338ca;
      border: 1px solid #c7d2fe;
      border-radius: 20px; padding: 4px 16px;
      font-size: 0.8em; font-weight: 600;
      margin-bottom: 24px;
    }
    .home-hero h1 {
      font-size: 3em; font-weight: 700; line-height: 1.2;
      margin-bottom: 16px; color: var(--text);
      letter-spacing: -0.03em;
    }
    .home-hero h1 .g {
      background: linear-gradient(135deg, #2563eb 0%, #7c3aed 60%, #d97706 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .home-hero p {
      font-size: 1.05em; color: var(--text2);
      max-width: 520px; margin: 0 auto 48px; line-height: 1.8;
    }
    .hero-stats {
      display: flex; gap: 40px; justify-content: center; flex-wrap: wrap;
    }
    .hero-stat .num {
      font-size: 2em; font-weight: 700; color: var(--text);
      letter-spacing: -0.02em;
    }
    .hero-stat .lbl { font-size: 0.8em; color: var(--text3); margin-top: 2px; }

    /* ── 区块标签 ── */
    .section-label {
      font-size: 0.72em; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--text3); margin-bottom: 14px; margin-top: 48px;
    }

    /* ── 轨道卡片网格 ── */
    .tracks-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
    }
    .track-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      text-decoration: none; color: inherit;
      display: block; position: relative;
      transition: box-shadow 0.2s, transform 0.2s, border-color 0.2s;
      overflow: hidden;
    }
    .track-card::before {
      content: ''; position: absolute;
      top: 0; left: 0; right: 0; height: 3px;
      background: var(--c, #2563eb);
    }
    .track-card:hover {
      box-shadow: var(--shadow);
      transform: translateY(-2px);
      border-color: var(--c, #2563eb);
      text-decoration: none;
    }
    .track-card .icon { font-size: 1.8em; margin-bottom: 10px; display: block; }
    .track-card .badge {
      display: inline-block;
      font-size: 0.72em; font-weight: 600;
      padding: 2px 10px; border-radius: 20px; margin-bottom: 10px;
      background: #f0f4ff; color: #4338ca;
      border: 1px solid #e0e7ff;
    }
    .track-card h3 { font-size: 1.05em; font-weight: 600; margin-bottom: 8px; }
    .track-card p { font-size: 0.84em; color: var(--text2); line-height: 1.65; margin-bottom: 18px; }
    .track-card .arr { font-size: 0.82em; color: var(--text3); transition: color 0.15s; }
    .track-card:hover .arr { color: var(--c, #2563eb); }

    /* ── 轨道页 Hero ── */
    .track-hero {
      padding: 48px 0 36px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 36px;
    }
    .track-eyebrow {
      font-size: 0.75em; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.1em;
      margin-bottom: 12px;
    }
    .track-hero h1 { font-size: 2em; font-weight: 700; margin-bottom: 12px; }
    .track-hero p { font-size: 0.95em; color: var(--text2); max-width: 560px; line-height: 1.7; }
    .track-stats { display: flex; gap: 32px; margin-top: 28px; flex-wrap: wrap; }
    .track-stat .num { font-size: 1.6em; font-weight: 700; }
    .track-stat .lbl { font-size: 0.75em; color: var(--text3); margin-top: 2px; }

    /* ── Phase 折叠 ── */
    .phases { display: flex; flex-direction: column; gap: 8px; }
    .phase {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .phase.open { border-color: var(--c, #2563eb); box-shadow: var(--shadow); }
    .phase-header {
      display: flex; align-items: center;
      justify-content: space-between;
      padding: 16px 20px; cursor: pointer;
      user-select: none;
      transition: background 0.15s;
    }
    .phase-header:hover { background: var(--border2); }
    .phase-left { display: flex; align-items: center; gap: 12px; }
    .phase-icon {
      width: 32px; height: 32px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1em; background: var(--border2); flex-shrink: 0;
    }
    .phase-title { font-weight: 600; font-size: 0.92em; }
    .phase-meta { font-size: 0.77em; color: var(--text3); margin-top: 2px; }
    .phase-right { display: flex; align-items: center; gap: 10px; }
    .phase-badge {
      font-size: 0.72em; background: var(--border2);
      color: var(--text3); padding: 3px 10px; border-radius: 20px;
    }
    .phase-arrow { color: var(--text3); font-size: 0.8em; transition: transform 0.2s; }
    .phase.open .phase-arrow { transform: rotate(90deg); }
    .phase-body { display: none; padding: 4px 20px 20px; }
    .phase.open .phase-body { display: block; }

    /* ── 周块 ── */
    .week-block { margin-top: 16px; }
    .week-label {
      font-size: 0.77em; font-weight: 600; color: var(--text3);
      text-transform: uppercase; letter-spacing: 0.05em;
      margin-bottom: 10px; padding-bottom: 8px;
      border-bottom: 1px solid var(--border2);
    }
    .day-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      gap: 7px;
    }
    .day-link {
      display: block; padding: 8px 12px;
      background: var(--border2);
      border: 1px solid var(--border);
      border-radius: 7px; color: var(--text2);
      text-decoration: none; font-size: 0.81em; line-height: 1.4;
      transition: all 0.15s;
    }
    .day-link:hover {
      background: #eef2ff;
      border-color: #c7d2fe;
      color: #3730a3;
      text-decoration: none;
    }
    .day-link.plan {
      background: #f0fdf4; border-color: #bbf7d0;
      color: #15803d; font-weight: 600;
    }
    .day-link.plan:hover { background: #dcfce7; }
    .coming { color: var(--text3); font-size: 0.82em; font-style: italic; padding: 8px 0; }

    /* ── 页脚 ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 28px 32px; text-align: center;
      color: var(--text3); font-size: 0.8em;
      background: var(--surface);
    }
    footer a { color: var(--text3); text-decoration: none; }
    footer a:hover { color: var(--ai); }

    /* ── 滚动条 ── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── 响应式 ── */
    @media (max-width: 720px) {
      nav { padding: 0 16px; }
      .nav-links a span.label { display: none; }
      .page-wrap { padding: 24px 16px 60px; }
      .home-hero h1 { font-size: 2em; }
      .tracks-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div id="progress-bar"></div>

<nav>
  <a class="nav-brand" href="{{ '/' | relative_url }}">🥚 🥚🥚的学习基地</a>
  <div class="nav-links">
    <a href="{{ '/ai/' | relative_url }}" style="--c:var(--ai)">
      <span class="dot" style="background:var(--ai)"></span><span class="label">AI基础</span></a>
    <a href="{{ '/llm/' | relative_url }}" style="--c:var(--llm)">
      <span class="dot" style="background:var(--llm)"></span><span class="label">大模型</span></a>
    <a href="{{ '/agent/' | relative_url }}" style="--c:var(--agent)">
      <span class="dot" style="background:var(--agent)"></span><span class="label">Agent</span></a>
    <a href="{{ '/infra/' | relative_url }}" style="--c:var(--infra)">
      <span class="dot" style="background:var(--infra)"></span><span class="label">Infra</span></a>
    <a href="{{ '/quant/' | relative_url }}" style="--c:var(--quant)">
      <span class="dot" style="background:var(--quant)"></span><span class="label">量化</span></a>
    <a href="{{ '/wisdom/' | relative_url }}" style="--c:var(--wisdom)">
      <span class="dot" style="background:var(--wisdom)"></span><span class="label">智慧心法</span></a>
  </div>
</nav>

<div class="page-wrap">
  {{ content }}
</div>

<footer>
  <div>🥚🥚的学习基地 · 由六位 AI 助教并行编写 · 每周持续更新</div>
  <div style="margin-top:6px">
    <a href="https://github.com/Lingbo-Huang/dandan-learn">GitHub</a>
    &nbsp;·&nbsp;
    <a href="{{ '/' | relative_url }}">返回首页</a>
  </div>
</footer>

<script>
window.addEventListener('scroll', function() {
  var s = document.documentElement.scrollTop;
  var h = document.documentElement.scrollHeight - document.documentElement.clientHeight;
  document.getElementById('progress-bar').style.width = (h > 0 ? s/h*100 : 0) + '%';
});
document.addEventListener('DOMContentLoaded', function() {
  document.querySelectorAll('.phase-header').forEach(function(h) {
    h.addEventListener('click', function() { h.parentElement.classList.toggle('open'); });
  });
  var first = document.querySelector('.phase');
  if (first) first.classList.add('open');

  var path = window.location.pathname;
  document.querySelectorAll('.nav-links a').forEach(function(a) {
    var href = a.getAttribute('href');
    if (href && href !== '/' && path.includes(href.replace(/^\/dandan-learn/, '').split('/').filter(Boolean)[0])) {
      a.classList.add('active');
    }
  });
});
</script>

</body>
</html>
