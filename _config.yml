title: 🥚🥚的学习基地
description: AI · 大模型 · Agent · AI Infra · 量化 —— 一年速成，从零到顶尖
url: "https://lingbo-huang.github.io"
baseurl: "/dandan-learn"
lang: zh-CN

markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    block:
      line_numbers: false

permalink: pretty

defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"
  - scope:
      path: "ai"
    values:
      layout: "post"
      track: "🧠 AI基础"
  - scope:
      path: "llm"
    values:
      layout: "post"
      track: "🤖 大模型"
  - scope:
      path: "agent"
    values:
      layout: "post"
      track: "🦾 Agent"
  - scope:
      path: "infra"
    values:
      layout: "post"
      track: "⚙️ AI Infra"
  - scope:
      path: "quant"
    values:
      layout: "post"
      track: "📈 量化"
  - scope:
      path: "wisdom"
    values:
      layout: "post"
      track: "🎯 智慧心法"

exclude:
  - "*.py"
  - "*.sh"
  - Gemfile
  - Gemfile.lock
  - README.md
