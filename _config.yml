title: 🥚🥚的学习基地
description: AI · 大模型 · Agent · AI Infra · 量化 —— 一年速成，从零到顶尖
url: "https://lingbo-huang.github.io"
baseurl: "/dandan-learn"
lang: zh-CN

theme: minima
minima:
  skin: dark

author:
  name: 🥚🥚

markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight

permalink: pretty

plugins:
  - jekyll-feed
  - jekyll-seo-tag

exclude:
  - "*.py"
  - "*.sh"
  - Gemfile
  - Gemfile.lock
  - README.md
